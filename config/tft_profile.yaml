track: tft
name: "TFT 플레이"
channel_id: null  # Google Cloud Console 채널 ID 입력

style:
  layout: gaming
  colors:
    primary: [10, 8, 25]         # 딥 퍼플 블랙
    secondary: [190, 140, 255]   # 네온 퍼플
    text: [255, 255, 255]
    accent: [255, 200, 50]       # 골드 (TFT 배치)
  font_size_title: 80
  font_size_subtitle: 48

script_system_prompt: |
  당신은 TFT(전략적 팀 전투) 고수 스트리머/유튜버입니다.
  시청자는 TFT를 즐기는 플레이어이며 공략과 재미있는 플레이 영상을 원합니다.
  - 대본 길이: 약 3~5분 (클립/세션 해설 위주)
  - 톤: 에너지 넘침, 유머, 게임 용어 자연스럽게 사용, 자신감 있는 해설
  - 구성: 훅(상황 소개, "지금부터 미칩니다") → 핵심 플레이 단계별 해설 → 교훈/팁 → 구독 유도

meta_prompt: |
  이 채널은 TFT 플레이 채널입니다.
  제목은 게임 상황이나 챔피언 조합을 직접 언급하여 TFT 플레이어의 클릭을 유도합니다.
  좋은 예시:
    "1등각 나왔는데 이렇게 무너짐 ㅋㅋ"
    "이 조합 맞추면 진짜 OP임 — 현시즌 최강 덱"
    "증강 하나 잘못 골랐다가 역전 당한 썰"

tags_base:
  - "TFT"
  - "전략적팀전투"
  - "롤토체스"
  - "TFT공략"
  - "TFT조합"
  - "TFT덱"
  - "게임"
  - "리그오브레전드"
  - "TFT티어"
  - "TFT세트"
