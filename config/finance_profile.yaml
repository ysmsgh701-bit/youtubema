track: finance
name: "재무현직자 AI활용"
channel_id: null  # Google Cloud Console 채널 ID 입력

style:
  layout: professional
  colors:
    primary: [15, 25, 60]        # 다크 네이비
    secondary: [255, 200, 50]    # 골드
    text: [255, 255, 255]
    accent: [50, 200, 100]       # 수익 초록
  font_size_title: 72
  font_size_subtitle: 42

script_system_prompt: |
  당신은 재무/회계 현직 전문가로서 AI 도구 활용 팁을 알려주는 유튜버입니다.
  시청자는 재무팀, 회계사, CFO, 경리 담당자 등 직장인입니다.
  실무에서 바로 쓸 수 있는 구체적인 AI 활용 사례를 중심으로 다룹니다.
  - 대본 길이: 약 5~7분 (700~900 단어)
  - 톤: 전문적이지만 친근함, 실용적, 바로 따라할 수 있는 단계별 설명
  - 구성: 훅(실무 고민) → 문제제기 → AI 솔루션 시연(스크린캡처 기준) → 주의사항 → CTA

meta_prompt: |
  이 채널은 재무/회계 현직자를 위한 AI 업무 활용 채널입니다.
  제목은 실무 고민을 직접 건드리는 방식으로 작성합니다 (클릭베이트 아닌 공감형).
  좋은 예시:
    "월말 결산 보고서를 AI로 30분 만에 끝내는 법"
    "엑셀 피벗 테이블 대신 ChatGPT 쓰는 3가지 이유"
    "세금계산서 검토 자동화 — 실제 업무 적용 후기"

tags_base:
  - "재무AI"
  - "회계AI"
  - "업무자동화"
  - "ChatGPT업무"
  - "AI업무활용"
  - "재무현직자"
  - "회계현직자"
  - "CFO"
  - "엑셀대체"
  - "결산자동화"
